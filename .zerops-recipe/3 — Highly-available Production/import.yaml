#zeropsPreprocessor=on

# Highly-available Production — 2–4 tinbase containers behind the Zerops L7 balancer
# over one HA (3-node) managed Postgres. Possible because tinbase is stateless (its
# data lives in db). Every container shares TINBASE_JWT_SECRET.

project:
  name: tinbase-ha
  corePackage: SERIOUS
  envVariables:
    TINBASE_JWT_SECRET: <@generateRandomString(<48>)>

services:
  - hostname: db
    type: postgresql:ha@17
    priority: 10
    profile: oltp-production

  - hostname: tinbase
    type: nodejs@22
    priority: 5
    buildFromGit: https://github.com/fxck/tinbase-zerops
    zeropsSetup: tinbase
    enableSubdomainAccess: true
    minContainers: 2
    maxContainers: 4
    verticalAutoscaling:
      minRam: 1
      maxRam: 16
