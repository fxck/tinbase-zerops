#zeropsPreprocessor=on

# Stage — one tinbase backend on a single-node managed Postgres, subdomain-exposed.

project:
  name: tinbase-stage
  corePackage: LIGHT
  envVariables:
    TINBASE_JWT_SECRET: <@generateRandomString(<48>)>

services:
  - hostname: db
    type: postgresql:single@17
    priority: 10
    profile: oltp-staging

  - hostname: tinbase
    type: nodejs@22
    priority: 5
    buildFromGit: https://github.com/fxck/tinbase-zerops
    zeropsSetup: tinbase
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
